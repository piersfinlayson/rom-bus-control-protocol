name: Build

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - 'spec/**'
      - '**/*.md'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  build-c64-boot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cc65
        run: sudo apt-get install -y cc65

      - name: Build c64-boot with pause before reset
        working-directory: reference/host/6502/c64-boot
        run: PAUSE_BEFORE_RESET=1 make

      - name: Build c64-boot
        working-directory: reference/host/6502/c64-boot
        run: make

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: c64-boot
          path: reference/host/6502/c64-boot/build/c64_boot.bin

  build-vic20-boot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cc65
        run: sudo apt-get install -y cc65

      - name: Build vic20-boot with pause before reset
        working-directory: reference/host/6502/vic20-boot
        run: PAUSE_BEFORE_RESET=1 make

      - name: Build vic20-boot
        working-directory: reference/host/6502/vic20-boot
        run: make

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vic20-boot
          path: |
            reference/host/6502/vic20-boot/build/vic20_boot_pal.bin
            reference/host/6502/vic20-boot/build/vic20_boot_ntsc.bin