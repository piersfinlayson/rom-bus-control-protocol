# c64_boot.cfg — ca65/ld65 linker configuration
# Copyright (C) 2026 Piers Finlayson <piers@piers.rocks>
#
# Zero-page layout ($E0-$FF):
#   $E0-$E4   rbcp_arg0-4       RBCP command argument buffer
#   $EB-$EE   zp_ptr_lo/hi, zp_tmp0/1   boot/hw scratch
#   $FB-$FF   rbcp_zp_0-4       RBCP library working registers
#
# ZP variables are fixed constants defined in the defs files; no ZEROPAGE
# segment is needed. The linker does not manage ZP allocation.
#
# Segment layout:
#   FILL      520 zero bytes at $E000 — the back-channel region.
#             Emitted in vectors.s; ROM fillval=$00 would also zero-fill
#             this region, but an explicit FILL segment guarantees CODE
#             and BOOT begin immediately after at $E208.
#
#   BOOT      Pre-relocation code: load=ROM, run=ROM.
#             Contains boot_entry, c64_hw_init, irq_nmi_stub.
#             These must run from ROM because RAM has not been initialised.
#             The RESET, NMI, and IRQ vectors point into this segment.
#
#   CODE      Post-relocation code: load=ROM, run=RAM=$C000.
#             ld65 emits __CODE_LOAD__, __CODE_RUN__, __CODE_SIZE__.
#             boot_entry copies exactly these bytes from ROM to $C000,
#             then jumps to boot_ram_entry (run address = $C000+offset).
#
#   RODATA    Read-only strings and tables: load=ROM, run=ROM.
#             Accessed by RAM-resident code via absolute ROM addresses.
#             Must not contain any pointers into CODE.
#
#   VECTORS   6-byte vector table at $FFFA-$FFFF.
#             All three vectors point into BOOT (ROM addresses).

MEMORY {
    RAM:   start = $C000, size = $1000, type = rw;
    ROM:   start = $E000, size = $2000, type = ro,
           fill = yes, fillval = $00;
}

SEGMENTS {
    BSS:     load = RAM, type = bss,  define = yes;
    FILL:    load = ROM, type = ro;
    BOOT:    load = ROM, run  = ROM,  type = ro;
    CODE:    load = ROM, run  = RAM,  type = ro,  define = yes;
    RODATA:  load = ROM, type = ro;
    VECTORS: load = ROM, type = ro,  start = $FFFA;
}